name: Bug Report
description: Something isn't working
labels: ["bug"]
body:
  - type: dropdown
    id: os
    attributes:
      label: Operating System
      options:
        - Windows
        - macOS
        - Linux
    validations:
      required: true

  - type: input
    id: python-version
    attributes:
      label: Python version
      placeholder: "e.g. 3.11.2  (run: python --version)"
    validations:
      required: true

  - type: dropdown
    id: setup-check
    attributes:
      label: Did check.py pass?
      options:
        - "Yes — all checks passed"
        - "No — one or more checks failed"
        - "I didn't run check.py"
    validations:
      required: true

  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: Describe the bug. Include the full error message and traceback if there is one.
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: What did you expect to happen?
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Relevant log output
      description: Paste any relevant output from the terminal or from the logs/ folder.
      render: shell
